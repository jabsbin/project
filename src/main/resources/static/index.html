<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8" />
    <title>청주 맛집 지도</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <style>
        :root { --pri:#0a4d9e; --ink:#111; --muted:#666; --line:#eee; }
        * { box-sizing: border-box; }
        body { margin:0; font-family: system-ui,-apple-system,Segoe UI,Roboto,sans-serif; color:var(--ink); }
        header { background:var(--pri); color:#fff; padding:16px 20px; font-size:20px; font-weight:700; }
        .toolbar { display:flex; gap:8px; padding:10px 12px; align-items:center; border-bottom:1px solid var(--line); flex-wrap:wrap; }
        .toolbar select, .toolbar input, .toolbar button {
          padding:6px 10px; font-size:14px; border:1px solid #ddd; border-radius:8px; background:#fff;
        }
        #map { width:100%; height:46vh; }

        .panel { display:flex; gap:16px; padding:10px 12px; }
        .left { flex:1; display:flex; flex-direction:column; }

        .route { display:flex; flex-wrap:wrap; gap:6px; align-items:center; }
        .route input { width:240px; }

        .suggest { list-style:none; margin:4px 0 0; padding:0; max-height:140px; overflow:auto; }
        .suggest li { padding:6px 8px; border:1px solid #eee; border-radius:8px; margin:4px 0; cursor:pointer; background:#fff; }

        .list-wrap { flex:1; display:flex; flex-direction:column; max-height:44vh; }
        .list { flex:1; overflow:auto; border-top:1px solid var(--line); border-bottom:1px solid var(--line); }

        .item { padding:8px 6px; border-bottom:1px dashed #e6e6e6; font-size:14px; cursor:pointer; }
        .item:hover { background:#fafafa; }

        .pager-row { display:flex; gap:6px; align-items:center; justify-content:center; padding:8px 0; }
        .pager-row button {
          min-width:32px; text-align:center; padding:6px 8px;
          border:1px solid #ddd; border-radius:8px; background:#fff; cursor:pointer;
        }
        .pager-row .active { background:#0a4d9e; color:#fff; border-color:#0a4d9e; }

        .muted { color:var(--muted); }
        .pill { display:inline-block; padding:2px 6px; border-radius:999px; font-size:12px; border:1px solid #ddd; margin-left:6px; }
    </style>

    <!-- 카카오 지도 SDK -->
    <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=ec7a521b62d776eb9f9d4089423e63da&libraries=clusterer"></script>
</head>
<body>

<header>🍜 청주 맛집 지도</header>

<div class="toolbar">
    <label>정렬
        <select id="order">
            <option value="distance" selected>내 위치와 거리</option>
            <option value="name">가나다순</option>
        </select>
    </label>

    <label>카테고리
        <input id="category" placeholder="예) 한식 / 카페 / 중식" style="width:160px;" />
    </label>

    <label>검색
        <input id="q" type="search" placeholder="가게명…" style="width:180px;" />
    </label>

    <label>표시개수
        <input id="limit" type="number" value="20" min="1" max="500" style="width:80px" />
    </label>

    <button id="btn-near">내 위치 기준</button>
    <button id="btn-center">내 위치로</button>
    <button id="btn-refresh">불러오기</button>

    <span id="status" class="muted" style="margin-left:auto;"></span>
</div>

<div id="map"></div>

<div class="panel">
    <div class="left">

        <div class="route">
            <input id="origin" placeholder="출발지 (주소 또는 위도,경도)" />
            <input id="dest" placeholder="도착지 (주소 또는 위도,경도)" />
            <button id="btn-route">길찾기</button>
            <ul id="suggest-origin" class="suggest"></ul>
            <ul id="suggest-dest" class="suggest"></ul>
        </div>

        <div class="list-wrap">
            <div class="list" id="list"></div>
            <div class="pager-row" id="pager"></div>
        </div>

    </div>
</div>

<script>
    let map, clusterer;
    let page=0, limit=20, total=0, totalPages=1;
    let userLat=null, userLng=null;
    let userMarker=null, userInfo=null;
    let currentItems = [];
    let suspendRefresh=false;
    let cachedOrigin=null, cachedDest=null;

    let routeLines=[];

    function clearRoute(){
      routeLines.forEach(l=>l.setMap(null));
      routeLines=[];
    }

    function initMap(){
      map=new kakao.maps.Map(document.getElementById('map'),{
        center:new kakao.maps.LatLng(36.635,127.491),
        level:7
      });

      clusterer=new kakao.maps.MarkerClusterer({
        map, averageCenter:true, minLevel:6
      });

      kakao.maps.event.addListener(map,'idle',()=>{
        if(!suspendRefresh){
          page=0;
          refresh();
        }
      });
    }

    function currentBBox(){
      const b=map.getBounds();
      const sw=b.getSouthWest();
      const ne=b.getNorthEast();
      return `${sw.getLng()},${sw.getLat()},${ne.getLng()},${ne.getLat()}`;
    }

    async function fetchJSON(url){
      const r=await fetch(url,{headers:{Accept:'application/json'}});
      const t=await r.text();
      if(!r.ok) throw new Error(`HTTP ${r.status} ${t.slice(0,120)}`);
      return JSON.parse(t);
    }

    function renderListAndMarkers(data){
      clusterer.clear();
      document.getElementById('list').innerHTML='';
      currentItems=data.items||[];
      const markers=[];

      currentItems.forEach(row=>{
        const pos=new kakao.maps.LatLng(row.lat,row.lng);
        const marker=new kakao.maps.Marker({position:pos});
        markers.push(marker);

        const dist=row.distance!=null?` · ${(row.distance/1000).toFixed(2)}km`:'';

        const iw=new kakao.maps.InfoWindow({
          content:`<div style="padding:8px;font-size:13px;">
            <b>${row.name}</b>
            ${row.category?` <span class="pill">${row.category}</span>`:''}
            <br>${row.address||''}${dist}
            ${row.phone?`<br>☎ ${row.phone}`:''}
          </div>`
        });

        kakao.maps.event.addListener(marker,'mouseover',()=>iw.open(map,marker));
        kakao.maps.event.addListener(marker,'mouseout',()=>iw.close());

        const div=document.createElement('div');
        div.className='item';
        div.innerHTML=`
          ${row.name}
          ${row.category?`<span class="pill">${row.category}</span>`:''}
          <div class="muted" style="font-size:12px;margin-top:2px;">
            ${row.address||''}
            ${dist}
          </div>
        `;

        div.onclick=()=>{
          map.panTo(pos);
          document.getElementById('dest').value=`${row.lat},${row.lng}`;
          cachedDest={lat:row.lat,lng:row.lng};
        };

        document.getElementById('list').appendChild(div);
      });

      clusterer.addMarkers(markers);
      if(userMarker) userMarker.setMap(map);
    }

    function renderPager(){
      const pager=document.getElementById('pager');
      pager.innerHTML='';
      const groupSize=5;
      const start=Math.floor(page/groupSize)*groupSize;
      const end=Math.min(start+groupSize,totalPages);

      if(start>0){
        const prev=document.createElement('button');
        prev.textContent='‹';
        prev.onclick=()=>{page=start-1;refresh();};
        pager.appendChild(prev);
      }

      for(let i=start;i<end;i++){
        const b=document.createElement('button');
        b.textContent=i+1;
        if(i===page) b.classList.add('active');
        b.onclick=()=>{page=i;refresh();};
        pager.appendChild(b);
      }

      if(end<totalPages){
        const next=document.createElement('button');
        next.textContent='›';
        next.onclick=()=>{page=end;refresh();};
        pager.appendChild(next);
      }
    }

    async function refresh(){
      const st=document.getElementById('status');
      st.textContent='불러오는 중…';

      const params=new URLSearchParams();
      params.set('bbox',currentBBox());

      limit=parseInt(document.getElementById('limit').value||'20',10);
      params.set('limit',limit);
      params.set('page',page);

      const order=document.getElementById('order').value;
      const q=document.getElementById('q').value.trim();
      const category=document.getElementById('category').value.trim();

      if(order) params.set('order',order);
      if(q) params.set('q',q);
      if(category) params.set('category',category);

      if(order==='distance'&&userLat&&userLng){
        params.set('lat',userLat);
        params.set('lng',userLng);
      }

      try{
        const data=await fetchJSON('/api/restaurants?'+params.toString());
        total=data.total||0;
        totalPages=Math.max(1,Math.ceil(total/limit));
        st.textContent=`총 ${total}곳 · ${page+1}/${totalPages}`;
        renderListAndMarkers(data);
        renderPager();
      }catch(e){
        st.textContent='로드 실패: '+e.message;
      }
    }

    window.addEventListener('load',()=>{
      initMap();
      refresh();

      document.getElementById('btn-refresh').onclick=()=>{page=0;refresh();};
      document.getElementById('order').onchange=()=>{page=0;refresh();};
      document.getElementById('q').oninput=()=>{page=0;refresh();};
      document.getElementById('category').oninput=()=>{page=0;refresh();};

      document.getElementById('btn-near').onclick=()=>{
        navigator.geolocation.getCurrentPosition(pos=>{
          userLat=pos.coords.latitude;
          userLng=pos.coords.longitude;
          const p=new kakao.maps.LatLng(userLat,userLng);
          map.panTo(p);

          if(!userMarker){
            userMarker=new kakao.maps.Marker({position:p});
            userMarker.setMap(map);
          }else{
            userMarker.setPosition(p);
          }

          document.getElementById('order').value='distance';
          page=0;
          refresh();
        });
      };

      document.getElementById('btn-route').onclick=async()=>{
        const originVal=document.getElementById('origin').value.trim();
        const destVal=document.getElementById('dest').value.trim();
        if(!destVal) return alert('도착지를 입력하세요.');

        clearRoute();

        const params=new URLSearchParams();
        params.set('origin',originVal||`${map.getCenter().getLat()},${map.getCenter().getLng()}`);
        params.set('dest',destVal);

        suspendRefresh=true;
        const res=await fetch('/api/route?'+params.toString());
        const data=await res.json();
        suspendRefresh=false;

        const coords=[];
        const routes=data.routes||[];
        const sections=routes[0]?.sections||[];

        sections.forEach(sec=>{
          (sec.roads||[]).forEach(r=>{
            const v=r.vertexes||[];
            for(let i=0;i<v.length;i+=2){
              coords.push(new kakao.maps.LatLng(v[i+1],v[i]));
            }
          });
        });

        if(coords.length){
          const line=new kakao.maps.Polyline({
            map, path:coords,
            strokeWeight:5,
            strokeColor:'#0a4d9e',
            strokeOpacity:0.9
          });
          routeLines.push(line);
        }
      };
    });
</script>

</body>
</html>
